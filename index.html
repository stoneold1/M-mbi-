<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Mūmbi Whispers</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #dce3db;
    --glass-bg: rgba(255, 255, 255, 0.45);
    --glass-border: rgba(255, 255, 255, 0.6);
    --text: #1d241e;
    --text-secondary: #4a5c4d;
    --bubble-user: rgba(255, 255, 255, 0.5);
    --accent: #3e5241;
    --input-bg: rgba(255, 255, 255, 0.3);
    --send-bg: #3e5241;
    --blur: 20px;
  }

  body.parchment {
    --bg: #f4eee0;
    --glass-bg: rgba(255, 252, 245, 0.4);
    --glass-border: rgba(255, 255, 255, 0.7);
    --text: #2a2016;
    --accent: #5c4a1e;
    --bubble-user: rgba(255, 255, 255, 0.4);
    --send-bg: #5c4a1e;
  }

  body.amoled {
    --bg: #000000;
    --glass-bg: rgba(28, 28, 30, 0.7);
    --glass-border: rgba(255, 255, 255, 0.12);
    --text: #e8e0d0;
    --accent: #a8c5a0;
    --bubble-user: rgba(255, 255, 255, 0.1);
    --send-bg: #a8c5a0;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    overflow: hidden;
    position: relative;
    transition: background 0.5s ease;
  }

  /* Ambient light blobs for mobile glass depth */
  body::before, body::after {
    content: '';
    position: fixed;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    filter: blur(80px);
    z-index: -1;
    opacity: 0.4;
    pointer-events: none;
  }
  body::before { top: -50px; right: -50px; background: var(--accent); }
  body::after { bottom: -50px; left: -50px; background: #ffffff; }

  #sidebar {
    width: 280px;
    height: 100%;
    background: var(--glass-bg);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border-right: 1px solid var(--glass-border);
    display: flex;
    flex-direction: column;
    z-index: 100;
  }

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    background: transparent;
  }

  #mobile-bar {
    display: none;
    height: 64px;
    padding: 0 20px;
    background: var(--glass-bg);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border-bottom: 1px solid var(--glass-border);
    align-items: center;
    justify-content: space-between;
    z-index: 50;
    margin-top: env(safe-area-inset-top);
  }

  .mobile-center-title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    scroll-behavior: smooth;
  }

  .bubble.user {
    background: var(--bubble-user);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    padding: 12px 18px;
    border-radius: 20px 20px 4px 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    margin-left: auto;
    max-width: 85%;
  }

  .bubble.ai {
    font-size: 16px;
    line-height: 1.7;
    max-width: 100%;
  }

  #input-wrap {
    padding: 12px 20px calc(20px + env(safe-area-inset-bottom));
    background: transparent;
  }

  #input-box {
    max-width: 720px;
    margin: 0 auto;
    background: var(--glass-bg);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border: 1px solid var(--glass-border);
    border-radius: 30px;
    padding: 8px 8px 8px 20px;
    display: flex;
    align-items: flex-end;
    gap: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 16px;
    padding: 10px 0;
    resize: none;
    font-family: inherit;
    max-height: 150px;
  }

  #send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--send-bg);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .sidebar-footer { padding: 20px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--glass-border); }
  .footer-btn {
    background: rgba(255,255,255,0.15); border: 1px solid var(--glass-border);
    color: var(--text); font-size: 13px; padding: 12px; border-radius: 14px;
    cursor: pointer; display: flex; align-items: center; gap: 10px; font-family: inherit;
  }

  .sidebar-brand { padding: 30px 20px; font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; color: var(--accent); }

  #chat-list { flex: 1; overflow-y: auto; padding: 10px; }
  .history-item { margin-bottom: 6px; border-radius: 14px; border: 1px solid transparent; background: transparent; transition: 0.3s; }
  .history-item:hover { background: var(--hover); border-color: var(--glass-border); }
  .chat-title { width: 100%; border: none; background: none; text-align: left; color: var(--text); padding: 12px 15px; font-family: inherit; cursor: pointer; }
  .chat-title.active { font-weight: 700; color: var(--accent); }

  @media (max-width: 700px) {
    #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); width: 280px; transition: transform 0.4s ease; }
    #sidebar.open { transform: translateX(0); }
    #mobile-bar { display: flex; }
    #overlay.show { position: fixed; inset: 0; background: rgba(0,0,0,0.2); backdrop-filter: blur(4px); z-index: 90; display: block; }
  }
</style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
  <div class="sidebar-brand">Mūmbi Whispers</div>
  <div id="chat-list"></div>
  <div class="sidebar-footer">
    <button id="new-chat-btn" class="footer-btn">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Whisper
    </button>
    <button id="sidebar-share-btn" class="footer-btn">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
      Share Essence
    </button>
    <button id="theme-btn" class="footer-btn">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      Shift Aura
    </button>
  </div>
</div>

<div id="main">
  <div id="mobile-bar">
    <button id="menu-btn" style="background:none; border:none; color:var(--text);"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="mobile-center-title">Mūmbi</div>
    <button id="share-btn" style="background:none; border:none; color:var(--text);"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg></button>
  </div>

  <div id="messages">
    <div class="messages-inner">
      <div id="welcome" style="text-align:center; padding-top:15vh;">
        <h2 style="font-family:'Cormorant Garamond'; font-size:48px; color:var(--accent);">Thaai</h2>
        <p style="opacity:0.6; font-style:italic;">The flame awaits your whisper.</p>
      </div>
    </div>
  </div>

  <div id="input-wrap">
    <div id="input-box">
      <textarea id="user-input" rows="1" placeholder="Whisper..."></textarea>
      <button id="send-btn"><svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    </div>
  </div>
</div>

<script>
let apiKey = localStorage.getItem('mumbi_key') || prompt("Enter Groq API Key:");
if (apiKey) localStorage.setItem('mumbi_key', apiKey);

const GROQ_MODEL = "llama-3.3-70b-versatile";
const SYSTEM_PROMPT = `You are Mūmbi. Ancient, wise, and direct.`;

let chatHistory = JSON.parse(localStorage.getItem('mumbi_v11')) || [{ id: Date.now().toString(), title: 'Initial Whisper', messages: [] }];
let activeChatId = chatHistory[0].id;
let themeIndex = parseInt(localStorage.getItem('mumbi_theme')) || 0;
const THEMES = ['', 'parchment', 'amoled'];

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const chatListEl = document.getElementById('chat-list');

function activeChat() { return chatHistory.find(c => c.id === activeChatId) || chatHistory[0]; }
function save() { localStorage.setItem('mumbi_v11', JSON.stringify(chatHistory)); localStorage.setItem('mumbi_theme', themeIndex); }

function renderMessages() {
  const chat = activeChat();
  let inner = messagesEl.querySelector('.messages-inner');
  inner.innerHTML = chat.messages.length ? '' : `<div id="welcome" style="text-align:center; padding-top:15vh;"><h2 style="font-family:'Cormorant Garamond'; font-size:48px; color:var(--accent);">Thaai</h2><p style="opacity:0.6; font-style:italic;">The flame awaits your whisper.</p></div>`;
  
  chat.messages.forEach(m => {
    const div = document.createElement('div');
    div.style.marginBottom = '20px';
    div.innerHTML = `<div class="bubble ${m.role}">${m.role === 'ai' ? marked.parse(m.content) : m.content}</div>`;
    inner.appendChild(div);
  });
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function renderChatList() {
  chatListEl.innerHTML = '';
  chatHistory.forEach(chat => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `<button class="chat-title ${chat.id === activeChatId ? 'active' : ''}" onclick="switchChat('${chat.id}')">${chat.title}</button>`;
    chatListEl.appendChild(div);
  });
}

window.switchChat = (id) => { activeChatId = id; renderMessages(); renderChatList(); closeSidebar(); };
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
document.getElementById('menu-btn').onclick = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('show'); };

async function handleSend() {
  const text = inputEl.value.trim();
  if (!text) return;
  const chat = activeChat();
  if (!chat.messages.length) chat.title = text.substring(0, 20);
  chat.messages.push({ role: 'user', content: text });
  inputEl.value = '';
  renderMessages();
  
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: GROQ_MODEL, messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...chat.messages] })
  });
  const data = await res.json();
  chat.messages.push({ role: 'ai', content: data.choices[0].message.content });
  save(); renderMessages(); renderChatList();
}

document.getElementById('send-btn').onclick = handleSend;
document.getElementById('new-chat-btn').onclick = () => {
  const id = Date.now().toString();
  chatHistory.unshift({ id, title: 'New Whisper', messages: [] });
  activeChatId = id;
  renderMessages(); renderChatList();
};

document.getElementById('theme-btn').onclick = () => {
  themeIndex = (themeIndex + 1) % THEMES.length;
  document.body.className = THEMES[themeIndex];
  save();
};

document.getElementById('sidebar-share-btn').onclick = document.getElementById('share-btn').onclick = () => {
  const t = activeChat().messages.map(m => m.content).join('\n\n');
  navigator.share ? navigator.share({ text: t }) : alert("Copied!");
};

document.body.className = THEMES[themeIndex];
renderMessages();
renderChatList();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KĪNARĪ | GitHub Edition</title>
    <style>
        :root { --gold: #d4af37; --fire: #ff4500; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; overflow: hidden; }

        /* Header Fix for Tecno */
        header { padding: 10px; background: #0a0a0a; border-bottom: 1px solid #333; flex-shrink: 0; }
        #keyField { width: 100%; background: #000; border: 1px solid var(--gold); color: var(--gold); padding: 12px; border-radius: 8px; margin-bottom: 8px; font-size: 14px; }
        
        /* The Big Flame */
        #spirit-center { flex: 0 0 auto; padding: 20px 0; text-align: center; }
        .flame-icon { font-size: 80px; display: inline-block; filter: drop-shadow(0 0 15px var(--fire)); animation: flicker 2s infinite ease-in-out; }
        @keyframes flicker { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 1; } }
        .thinking { animation: intense 0.4s infinite alternate !important; }
        @keyframes intense { from { transform: scale(1.1); } to { transform: scale(1.4); } }

        /* Chat Display */
        #shrine-history { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; border-top: 1px solid #111; }
        .bubble { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 16px; line-height: 1.4; }
        .kinari { align-self: flex-start; background: #111; border-left: 4px solid var(--gold); color: #fff; }
        .visitor { align-self: flex-end; background: var(--gold); color: #000; font-weight: bold; }

        /* Bottom Controls */
        #input-dock { background: #000; border-top: 1px solid #333; padding: 15px; display: flex; gap: 10px; align-items: center; }
        #userInput { flex: 1; background: #1a1a1a; border: 1px solid #444; color: #fff; padding: 14px; border-radius: 30px; font-size: 16px; outline: none; }
        .btn { width: 50px; height: 50px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        #micBtn { background: #222; color: var(--gold); border: 1px solid var(--gold); }
        #sendBtn { background: var(--gold); color: #000; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <input type="password" id="keyField" placeholder="PASTE GROQ KEY HERE" oninput="saveKey()">
</header>

<div id="spirit-center">
    <div class="flame-icon" id="flame">🔥</div>
    <div id="status" style="font-size: 11px; color: var(--gold); margin-top: 8px; letter-spacing: 2px;">KĪNARĪ</div>
</div>

<div id="shrine-history"></div>

<div id="input-dock">
    <button class="btn" id="micBtn" onclick="startListening()">🎙️</button>
    <input type="text" id="userInput" placeholder="Whisper to the fire...">
    <button class="btn" id="sendBtn" onclick="ignite()">🔥</button>
</div>

<script>
    const flame = document.getElementById('flame');
    const shrine = document.getElementById('shrine-history');
    const input = document.getElementById('userInput');
    const keyField = document.getElementById('keyField');
    const status = document.getElementById('status');

    // Load Key on Start
    window.onload = () => {
        const savedKey = localStorage.getItem('kinari_key_official');
        if(savedKey) keyField.value = savedKey;
        addMsg('kinari', "The Flame is hosted. Ensure your Key is pasted above.");
    };

    function saveKey() {
        localStorage.setItem('kinari_key_official', keyField.value.trim());
        status.innerText = "KEY UPDATED";
        setTimeout(() => status.innerText = "KĪNARĪ", 2000);
    }

    function addMsg(role, text) {
        const div = document.createElement('div');
        div.className = `bubble ${role}`;
        div.innerText = text;
        shrine.appendChild(div);
        shrine.scrollTop = shrine.scrollHeight;
    }

    async function ignite() {
        const key = keyField.value.trim();
        const prompt = input.value.trim();

        if(!key) {
            alert("Please paste your Groq API Key first!");
            return;
        }
        if(!prompt) return;

        addMsg('visitor', prompt);
        input.value = "";
        flame.classList.add('thinking');
        status.innerText = "BURNING...";

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${key}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        {role: "system", content: "You are Kīnarī. Speak with high ancestral wisdom in English."},
                        {role: "user", content: prompt}
                    ]
                })
            });

            if (!response.ok) throw new Error("Connection failed");

            const data = await response.json();
            addMsg('kinari', data.choices[0].message.content);
        } catch (err) {
            addMsg('kinari', "The flame flickered. Check your API key or data connection.");
        } finally {
            flame.classList.remove('thinking');
            status.innerText = "KĪNARĪ";
        }
    }

    function startListening() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) {
            alert("Voice not supported in this browser.");
            return;
        }

        const recognition = new Speech();
        recognition.lang = 'en-US';

        recognition.onstart = () => {
            status.innerText = "LISTENING...";
            flame.style.filter = "grayscale(100%)";
        };

        recognition.onresult = (event) => {
            input.value = event.results[0][0].transcript;
            ignite(); // Auto-send when you stop talking
        };

        recognition.onerror = () => {
            status.innerText = "MIC ERROR";
        };

        recognition.onend = () => {
            status.innerText = "KĪNARĪ";
            flame.style.filter = "drop-shadow(0 0 15px var(--fire))";
        };

        recognition.start();
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Mūmbi Whispers</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #dce3db;
    --glass-bg: rgba(255, 255, 255, 0.45);
    --glass-border: rgba(255, 255, 255, 0.6);
    --text: #1d241e;
    --bubble-user: rgba(255, 255, 255, 0.5);
    --accent: #3e5241;
    --send-bg: #3e5241;
    --blur: 20px;
  }

  body.azure {
    --bg: #0a192f;
    --glass-bg: rgba(16, 33, 65, 0.7);
    --glass-border: rgba(100, 255, 218, 0.2);
    --text: #e6f1ff;
    --accent: #64ffda;
    --bubble-user: rgba(255, 255, 255, 0.1);
    --send-bg: #64ffda;
  }

  body.frost {
    --bg: #ffffff;
    --glass-bg: rgba(240, 245, 255, 0.5);
    --glass-border: rgba(0, 122, 255, 0.2);
    --text: #004a99;
    --accent: #007aff;
    --bubble-user: rgba(0, 122, 255, 0.1);
    --send-bg: #007aff;
  }

  body.amoled {
    --bg: #000000;
    --glass-bg: rgba(28, 28, 30, 0.7);
    --glass-border: rgba(255, 255, 255, 0.12);
    --text: #e8e0d0;
    --accent: #a8c5a0;
    --bubble-user: rgba(255, 255, 255, 0.1);
    --send-bg: #a8c5a0;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    overflow: hidden;
    transition: background 0.5s ease;
  }

  /* SIDEBAR */
  #sidebar {
    width: 280px;
    height: 100%;
    background: var(--glass-bg);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border-right: 1px solid var(--glass-border);
    display: flex;
    flex-direction: column;
    z-index: 200;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .sidebar-brand { padding: 30px 20px 10px; font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; color: var(--accent); }

  #chat-list { flex: 1; overflow-y: auto; padding: 10px; margin-top: 10px; }

  .history-item { 
    margin-bottom: 6px; 
    border-radius: 14px; 
    display: flex; 
    align-items: center; 
    transition: 0.3s;
    border: 1px solid transparent;
  }
  .history-item:hover { background: rgba(255,255,255,0.08); border-color: var(--glass-border); }

  .chat-title { 
    flex: 1; 
    border: none; 
    background: none; 
    text-align: left; 
    color: var(--text); 
    padding: 12px 15px; 
    font-family: inherit; 
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 14px;
  }
  .chat-title.active { font-weight: 700; color: var(--accent); }

  .menu-dots-btn {
    background: none;
    border: none;
    color: var(--text);
    padding: 10px 15px;
    cursor: pointer;
    opacity: 0.6;
    font-size: 18px;
    font-weight: bold;
  }
  .menu-dots-btn:hover { opacity: 1; }

  /* MAIN AREA */
  #main { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; }

  #mobile-bar {
    display: none;
    height: 64px;
    padding: 0 15px;
    background: var(--glass-bg);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border-bottom: 1px solid var(--glass-border);
    align-items: center;
    justify-content: space-between;
    z-index: 100;
  }

  /* Fixed Mobile Header centering */
  .mobile-center-title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    pointer-events: none;
  }

  #messages { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
  .messages-inner { width: 100%; max-width: 720px; margin: 0 auto; }

  /* BUBBLES */
  .bubble { padding: 14px 18px; border-radius: 20px; line-height: 1.6; margin-bottom: 15px; font-size: 15.5px; }
  .bubble.user {
    background: var(--bubble-user);
    border: 1px solid var(--glass-border);
    margin-left: auto;
    border-bottom-right-radius: 4px;
    color: var(--text);
    max-width: 85%;
  }
  .bubble.ai { background: transparent; color: var(--text); max-width: 100%; }
  .bubble.ai p { margin-bottom: 12px; }

  /* INPUT */
  #input-wrap { padding: 12px 20px calc(20px + env(safe-area-inset-bottom)); }
  #input-box {
    max-width: 720px; margin: 0 auto;
    background: var(--glass-bg); backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border: 1px solid var(--glass-border); border-radius: 30px;
    padding: 8px 8px 8px 20px; display: flex; align-items: flex-end; gap: 12px;
  }

  #user-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-size: 16px; padding: 10px 0; resize: none; font-family: inherit;
    max-height: 180px;
  }

  #send-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--send-bg); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: transform 0.2s;
  }
  #send-btn:active { transform: scale(0.9); }

  .sidebar-footer { padding: 20px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--glass-border); }
  .footer-btn {
    background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);
    color: var(--text); font-size: 13px; padding: 12px; border-radius: 14px;
    cursor: pointer; display: flex; align-items: center; gap: 10px; font-family: inherit;
    transition: background 0.2s;
  }
  .footer-btn:hover { background: rgba(255,255,255,0.2); }

  /* CONTEXT MENU */
  #context-menu {
    display: none; position: fixed; background: var(--glass-bg); backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px); border: 1px solid var(--glass-border); 
    border-radius: 15px; z-index: 1000; overflow: hidden;
    min-width: 140px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  #context-menu button {
    display: block; width: 100%; padding: 14px 18px; border: none; background: none;
    color: var(--text); text-align: left; cursor: pointer; font-family: inherit; font-size: 14px;
  }
  #context-menu button:hover { background: rgba(255,255,255,0.1); }

  @media (max-width: 700px) {
    #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); width: 290px; }
    #sidebar.open { transform: translateX(0); }
    #mobile-bar { display: flex; }
    #overlay.show { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); z-index: 150; display: block; }
  }
</style>
</head>
<body class="azure">

<div id="overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
  <div class="sidebar-brand">Mūmbi Whispers</div>
  <div id="chat-list"></div>
  <div class="sidebar-footer">
    <button id="new-chat-btn" class="footer-btn">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Whisper
    </button>
    <button id="sidebar-share-btn" class="footer-btn">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
      Share Essence
    </button>
    <button id="theme-btn" class="footer-btn">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      Shift Aura
    </button>
  </div>
</div>

<div id="main">
  <div id="mobile-bar">
    <button id="menu-btn" style="background:none; border:none; color:var(--text); padding: 10px; cursor:pointer;">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="mobile-center-title">Mūmbi</div>
    <button id="share-btn" style="background:none; border:none; color:var(--text); padding: 10px; cursor:pointer;">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
    </button>
  </div>

  <div id="messages">
    <div class="messages-inner">
      <div id="welcome" style="text-align:center; padding-top:15vh;">
        <h2 style="font-family:'Cormorant Garamond'; font-size:48px; color:var(--accent);">Thaai</h2>
        <p style="opacity:0.6; font-style:italic; margin-top:10px;">The flame awaits your whisper.</p>
      </div>
    </div>
  </div>

  <div id="input-wrap">
    <div id="input-box">
      <textarea id="user-input" rows="1" placeholder="Whisper..."></textarea>
      <button id="send-btn">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<div id="context-menu">
  <button onclick="triggerRename()">Rename</button>
  <button onclick="triggerDelete()" style="color:#ff4d4d;">Delete</button>
</div>

<script>
let apiKey = localStorage.getItem('mumbi_key') || prompt("Enter Groq API Key:");
if (apiKey) localStorage.setItem('mumbi_key', apiKey);

const GROQ_MODEL = "llama-3.3-70b-versatile";
const SYSTEM_PROMPT = `You are Mūmbi. Ancient, wise, and direct. Provide no filler. Respond in a way that feels sacred.`;

let chatHistory = JSON.parse(localStorage.getItem('mumbi_v11')) || [{ id: Date.now().toString(), title: 'Initial Whisper', messages: [] }];
let activeChatId = chatHistory[0].id;
let themeIndex = parseInt(localStorage.getItem('mumbi_theme')) || 0;
const THEMES = ['azure', 'frost', 'amoled', ''];
let menuTargetId = null;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const chatListEl = document.getElementById('chat-list');
const contextMenu = document.getElementById('context-menu');

function activeChat() { return chatHistory.find(c => c.id === activeChatId) || chatHistory[0]; }
function save() { localStorage.setItem('mumbi_v11', JSON.stringify(chatHistory)); localStorage.setItem('mumbi_theme', themeIndex); }

function renderMessages() {
  const chat = activeChat();
  let inner = messagesEl.querySelector('.messages-inner');
  inner.innerHTML = '';
  
  if (chat.messages.length === 0) {
    inner.innerHTML = `<div id="welcome" style="text-align:center; padding-top:15vh;"><h2 style="font-family:'Cormorant Garamond'; font-size:48px; color:var(--accent);">Thaai</h2><p style="opacity:0.6; font-style:italic; margin-top:10px;">The flame awaits your whisper.</p></div>`;
  } else {
    chat.messages.forEach(m => {
      const div = document.createElement('div');
      div.className = `bubble ${m.role}`;
      div.innerHTML = m.role === 'ai' ? marked.parse(m.content) : m.content;
      inner.appendChild(div);
    });
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function renderChatList() {
  chatListEl.innerHTML = '';
  chatHistory.forEach(chat => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `
      <button class="chat-title ${chat.id === activeChatId ? 'active' : ''}" onclick="switchChat('${chat.id}')">${chat.title}</button>
      <button class="menu-dots-btn" onclick="showMenu(event, '${chat.id}')">···</button>
    `;
    chatListEl.appendChild(div);
  });
}

window.showMenu = (e, id) => {
  e.stopPropagation();
  menuTargetId = id;
  contextMenu.style.display = 'block';
  contextMenu.style.top = `${e.clientY}px`;
  contextMenu.style.left = `${Math.min(e.clientX, window.innerWidth - 160)}px`;
};

window.triggerRename = () => {
  const chat = chatHistory.find(c => c.id === menuTargetId);
  const n = prompt("Rename Whisper:", chat.title);
  if (n) { chat.title = n; save(); renderChatList(); }
  contextMenu.style.display = 'none';
};

window.triggerDelete = () => {
  if (confirm("Delete this whisper?")) {
    chatHistory = chatHistory.filter(c => c.id !== menuTargetId);
    if (!chatHistory.length) chatHistory = [{ id: Date.now().toString(), title: 'New Whisper', messages: [] }];
    activeChatId = chatHistory[0].id;
    save(); renderChatList(); renderMessages();
  }
  contextMenu.style.display = 'none';
};

window.switchChat = (id) => { activeChatId = id; renderMessages(); renderChatList(); closeSidebar(); };
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
document.getElementById('menu-btn').onclick = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('show'); };

async function handleSend() {
  const text = inputEl.value.trim();
  if (!text) return;
  const chat = activeChat();
  if (chat.messages.length === 0) chat.title = text.substring(0, 25);
  chat.messages.push({ role: 'user', content: text });
  inputEl.value = '';
  inputEl.style.height = 'auto'; // Reset height
  renderMessages();
  
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: GROQ_MODEL, messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...chat.messages] })
    });
    const data = await res.json();
    chat.messages.push({ role: 'ai', content: data.choices[0].message.content });
    save(); renderMessages(); renderChatList();
  } catch (e) { console.error(e); }
}

// FIX: ENTER TO SEND
inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
    }
});

// Auto-expand input
inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = (inputEl.scrollHeight) + 'px';
});

document.getElementById('send-btn').onclick = handleSend;

document.getElementById('new-chat-btn').onclick = () => {
  if (activeChat().messages.length === 0) {
    closeSidebar();
    return;
  }
  const id = Date.now().toString();
  chatHistory.unshift({ id, title: 'New Whisper', messages: [] });
  activeChatId = id;
  renderMessages(); renderChatList(); closeSidebar();
};

document.getElementById('theme-btn').onclick = () => {
  themeIndex = (themeIndex + 1) % THEMES.length;
  document.body.className = THEMES[themeIndex];
  save();
};

document.getElementById('sidebar-share-btn').onclick = document.getElementById('share-btn').onclick = () => {
  const chat = activeChat();
  if (!chat.messages.length) return;
  const t = chat.messages.map(m => `${m.role.toUpperCase()}: ${m.content}`).join('\n\n');
  if (navigator.share) navigator.share({ title: 'Mūmbi Whisper', text: t });
  else { navigator.clipboard.writeText(t); alert("Whisper copied to clipboard."); }
};

window.onclick = () => contextMenu.style.display = 'none';

document.body.className = THEMES[themeIndex];
renderMessages();
renderChatList();
</script>
</body>
</html>

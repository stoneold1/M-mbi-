<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KĪNARĪ | The Great Voice</title>
    <style>
        :root { --gold: #d4af37; --fire: #ff4500; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100dvh; width: 100%; margin: 0; padding: 0; 
            background: var(--bg); color: #fff; font-family: 'Georgia', serif; 
            overflow: hidden; display: flex; flex-direction: column;
        }

        header { padding: 10px; background: #0a0a0a; border-bottom: 1px solid #222; z-index: 100; }
        #keyField { 
            width: 100%; background: #000; border: 1px solid #444; color: var(--gold); 
            padding: 12px; border-radius: 8px; font-size: 14px; text-align: center;
        }

        /* Symbol & Big Name */
        #spirit-center { flex: 0 0 auto; padding: 15px 0; text-align: center; }
        .flame-icon { font-size: 70px; filter: drop-shadow(0 0 15px var(--fire)); animation: flicker 2s infinite; }
        @keyframes flicker { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        #kinari-title { 
            font-size: 32px; /* Bigger than all other text */
            font-weight: bold;
            color: var(--gold); 
            letter-spacing: 8px; 
            margin-top: 10px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        /* Chat History */
        #shrine-history { 
            flex: 1; overflow-y: auto; padding: 10px 20px; 
            display: flex; flex-direction: column; gap: 15px;
            align-items: center;
        }
        .bubble { 
            width: 90%; max-width: 300px; 
            padding: 16px; border-radius: 20px; font-size: 16px; line-height: 1.6; 
        }
        .kinari { background: #111; border-left: 5px solid var(--gold); color: #efefef; }
        .visitor { background: var(--gold); color: #000; font-weight: bold; }

        /* Fixed Input Dock - No Stretching */
        #input-dock { 
            background: #050505; border-top: 1px solid #333;
            padding: 15px 20px calc(env(safe-area-inset-bottom) + 30px);
            display: flex; justify-content: center; align-items: center; gap: 12px;
        }
        #userInput { 
            flex: 1; max-width: 200px; /* Prevents pushing buttons out */
            background: #1a1a1a; border: 1px solid #444; color: #fff; 
            padding: 12px 15px; border-radius: 25px; font-size: 16px;
        }
        .dock-btn { 
            flex: 0 0 50px; width: 50px; height: 50px; 
            border-radius: 50%; border: none; 
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem; 
        }
        #micBtn { background: #222; border: 1px solid var(--gold); color: var(--gold); }
        #sendBtn { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <header>
        <input type="password" id="keyField" placeholder="Paste Key" onchange="saveKey()">
    </header>

    <div id="spirit-center">
        <div class="flame-icon" id="flame">🔥</div>
        <div id="kinari-title">KĪNARĪ</div>
    </div>

    <div id="shrine-history"></div>

    <div id="input-dock">
        <button class="dock-btn" id="micBtn" onclick="toggleListening()">🎙️</button>
        <input type="text" id="userInput" placeholder="...">
        <button class="dock-btn" id="sendBtn" onclick="consult()">🔥</button>
    </div>

    <script>
        const flame = document.getElementById('flame');
        const shrine = document.getElementById('shrine-history');
        const input = document.getElementById('userInput');
        const keyField = document.getElementById('keyField');

        window.onload = () => {
            keyField.value = localStorage.getItem('kinari_final_key') || "";
            addMsg('kinari', "The flame is high. The voice is ready.");
        };

        function saveKey() { localStorage.setItem('kinari_final_key', keyField.value.trim()); }

        function addMsg(role, text) {
            const div = document.createElement('div');
            div.className = `bubble ${role}`;
            div.innerText = text;
            shrine.appendChild(div);
            shrine.scrollTop = shrine.scrollHeight;
            if(role === 'kinari') speakHuman(text);
        }

        async function consult() {
            const key = keyField.value.trim();
            const prompt = input.value.trim();
            if(!key || !prompt) return;

            addMsg('visitor', prompt);
            input.value = "";
            flame.classList.add('thinking');

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "system", content: "You are Kīnarī. Speak as a wise human elder." }, { role: "user", content: prompt }]
                    })
                });
                const data = await res.json();
                addMsg('kinari', data.choices[0].message.content);
            } catch (e) { addMsg('kinari', "Connection lost."); }
            finally { flame.classList.remove('thinking'); }
        }

        // --- HUMAN VOICE EMULATION ---
        function speakHuman(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            
            // Look for 'Natural' or 'Premium' voices on the phone
            let humanVoice = voices.find(v => v.name.includes('Natural') || v.name.includes('Premium') || v.lang === 'en-GB');
            utterance.voice = humanVoice || voices[0];
            
            utterance.pitch = 0.75; // Deep human resonance
            utterance.rate = 0.85;  // Slow, thoughtful pace
            utterance.volume = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        function toggleListening() {
            const Speech = window.webkitSpeechRecognition || window.SpeechRecognition;
            const rec = new Speech();
            rec.onstart = () => flame.style.opacity = "0.4";
            rec.onresult = (e) => { input.value = e.results[0][0].transcript; consult(); };
            rec.onend = () => flame.style.opacity = "1";
            rec.start();
        }
    </script>
</body>
</html>

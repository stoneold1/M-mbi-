<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KĪNARĪ | Clean Interface</title>
    <style>
        :root { --gold: #d4af37; --fire: #ff4500; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100dvh; width: 100%; margin: 0; padding: 0; 
            background: var(--bg); color: #fff; font-family: 'serif'; 
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* Header: Minimalist */
        header { padding: 8px; background: #0a0a0a; border-bottom: 1px solid #222; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
        
        /* Key Section: Shrinking Logic */
        #key-container { display: none; flex-direction: column; gap: 5px; background: #111; padding: 10px; border-radius: 8px; border: 1px solid var(--gold); }
        #keyField { width: 100%; background: #000; border: 1px solid #444; color: var(--gold); padding: 12px; border-radius: 6px; font-size: 14px; text-align: center; }
        
        .nav-row { display: flex; gap: 6px; }
        .nav-btn { flex: 1; background: #1a1a1a; border: 1px solid #444; color: var(--gold); padding: 10px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .key-toggle { background: #111; color: var(--gold); border: 1px solid #333; padding: 5px; font-size: 10px; border-radius: 4px; align-self: flex-end; }

        /* Symbol & Title */
        #spirit-center { flex: 0 0 auto; padding: 10px 0; text-align: center; }
        .flame-icon { font-size: 45px; filter: drop-shadow(0 0 10px var(--fire)); animation: flicker 2s infinite; }
        @keyframes flicker { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        
        #kinari-title { font-size: 24px; font-weight: bold; color: var(--gold); letter-spacing: 5px; margin-top: 5px; }

        /* Chat History: Full Width */
        #shrine-history { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { width: 100%; padding: 16px; border-radius: 12px; font-size: 16px; line-height: 1.5; }
        .kinari { background: #0d0d0d; border-left: 5px solid var(--gold); color: #efefef; align-self: flex-start; }
        .visitor { background: var(--gold); color: #000; font-weight: bold; align-self: flex-end; }

        /* Input Dock: Balanced for Tecno */
        #input-dock { 
            background: #050505; border-top: 1px solid #222;
            padding: 10px 15px calc(env(safe-area-inset-bottom) + 20px);
            display: flex; gap: 10px; align-items: center;
        }
        #userInput { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 14px; border-radius: 25px; font-size: 16px; min-width: 0; }
        .dock-btn { flex: 0 0 50px; width: 50px; height: 50px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        #micBtn { background: #222; border: 1px solid var(--gold); color: var(--gold); }
        #sendBtn { background: var(--gold); color: #000; }

        /* Library Modal */
        #library { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; display: none; padding: 40px 20px; }
        .scroll-row { background: #111; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <header>
        <button class="key-toggle" id="toggleBtn" onclick="toggleKeyField()">🔑 CONFIGURE SOURCE</button>
        <div id="key-container">
            <input type="password" id="keyField" placeholder="Paste API Key Here">
            <button class="nav-btn" onclick="saveKey()">SAVE & HIDE</button>
        </div>
        <div class="nav-row">
            <button class="nav-btn" onclick="openLib()">📜 LIBRARY</button>
            <button class="nav-btn" onclick="newScl()">+ NEW SCROLL</button>
        </div>
    </header>

    <div id="spirit-center">
        <div class="flame-icon" id="flame">🔥</div>
        <div id="kinari-title">KĪNARĪ</div>
    </div>

    <div id="shrine-history"></div>

    <div id="input-dock">
        <button class="dock-btn" id="micBtn" onclick="toggleListening()">🎙️</button>
        <input type="text" id="userInput" placeholder="Whisper...">
        <button class="dock-btn" id="sendBtn" onclick="consult()">🔥</button>
    </div>

    <div id="library">
        <h2 style="color:var(--gold)">Ancestral Scrolls</h2>
        <div id="lib-list"></div>
        <button onclick="closeLib()" style="width:100%; padding:15px; background:var(--gold); font-weight:bold; border-radius:8px; margin-top:20px;">RETURN</button>
    </div>

    <script>
        const flame = document.getElementById('flame');
        const shrine = document.getElementById('shrine-history');
        const input = document.getElementById('userInput');
        const keyField = document.getElementById('keyField');
        const keyContainer = document.getElementById('key-container');
        const toggleBtn = document.getElementById('toggleBtn');
        let activeID = localStorage.getItem('active_scl') || 'main_pipe';

        window.onload = () => {
            const savedKey = localStorage.getItem('kinari_official_key');
            if(savedKey) {
                keyField.value = savedKey;
                toggleBtn.innerText = "✅ SOURCE READY";
            }
            loadScl(activeID);
        };

        function toggleKeyField() {
            const isHidden = keyContainer.style.display === 'none' || keyContainer.style.display === '';
            keyContainer.style.display = isHidden ? 'flex' : 'none';
        }

        function saveKey() {
            localStorage.setItem('kinari_official_key', keyField.value.trim());
            toggleKeyField();
            toggleBtn.innerText = "✅ SOURCE READY";
        }

        function loadScl(id) {
            activeID = id;
            localStorage.setItem('active_scl', id);
            shrine.innerHTML = "";
            const history = JSON.parse(localStorage.getItem(id) || "[]");
            if(history.length === 0) addMsg('kinari', "The flame is lit. Speak your intent.");
            else history.forEach(m => addMsg(m.role, m.text, false));
            closeLib();
        }

        function newScl() { loadScl('srl_' + Date.now()); }

        function addMsg(role, text, save = true) {
            const div = document.createElement('div');
            div.className = `bubble ${role}`;
            div.innerText = text;
            shrine.appendChild(div);
            shrine.scrollTop = shrine.scrollHeight;
            if(save) {
                const history = JSON.parse(localStorage.getItem(activeID) || "[]");
                history.push({role, text});
                localStorage.setItem(activeID, JSON.stringify(history));
            }
            if(role === 'kinari') speakHuman(text);
        }

        async function consult() {
            const key = keyField.value.trim();
            const prompt = input.value.trim();
            if(!key) { alert("Please configure Source Key first."); toggleKeyField(); return; }
            if(!prompt) return;

            addMsg('visitor', prompt);
            input.value = "";
            flame.style.opacity = "0.5";

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "system", content: "You are Kīnarī. Speak as a wise human elder." }, { role: "user", content: prompt }]
                    })
                });
                const data = await res.json();
                addMsg('kinari', data.choices[0].message.content);
            } catch (e) { addMsg('kinari', "Connection lost."); }
            finally { flame.style.opacity = "1"; }
        }

        function speakHuman(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            // Tuning for the most human-like cadence available on Android
            utterance.voice = voices.find(v => v.name.includes('en-GB') || v.name.includes('Google')) || voices[0];
            utterance.pitch = 0.82; 
            utterance.rate = 0.88; 
            window.speechSynthesis.speak(utterance);
        }

        function toggleListening() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.onstart = () => flame.style.filter = "grayscale(1)";
            rec.onresult = (e) => { input.value = e.results[0][0].transcript; consult(); };
            rec.onend = () => flame.style.filter = "none";
            rec.start();
        }

        function openLib() {
            document.getElementById('library').style.display = 'block';
            const list = document.getElementById('lib-list');
            list.innerHTML = `<div class="scroll-row"><span>Main Pipe</span><button onclick="loadScl('main_pipe')">OPEN</button></div>`;
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k.startsWith('srl_')) {
                    const d = new Date(parseInt(k.split('_')[1])).toLocaleDateString();
                    list.innerHTML += `<div class="scroll-row"><span>Scroll ${d}</span><button onclick="loadScl('${k}')">OPEN</button></div>`;
                }
            }
        }
        function closeLib() { document.getElementById('library').style.display = 'none'; }
    </script>
</body>
</html>
